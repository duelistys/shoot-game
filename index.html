<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>蹴鞠大擂台 · 射门小游戏</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#1a0a00;
  font-family:"Microsoft YaHei","PingFang SC",sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;user-select:none;
}

/* ===== 游戏主容器 ===== */
#gameWrap{
  position:relative;
  width:700px;height:520px;
}

/* ===== 绿茵球场 ===== */
#field{
  position:absolute;inset:0;
  background:linear-gradient(180deg,#2d8a2d 0%,#38a838 50%,#2d8a2d 100%);
  border-radius:4px;
  overflow:hidden;
}

/* 球场条纹 */
#field::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    180deg,
    rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 40px,
    transparent 40px, transparent 80px
  );
}

/* 球场边线 */
.field-lines{
  position:absolute;inset:20px;
  border:3px solid rgba(255,255,255,0.85);
  border-radius:2px;
}

/* 中线 */
.center-line{
  position:absolute;left:50%;top:20px;bottom:20px;
  width:3px;background:rgba(255,255,255,0.85);
  transform:translateX(-50%);
}

/* 中圆 */
.center-circle{
  position:absolute;
  width:100px;height:100px;
  border:3px solid rgba(255,255,255,0.85);
  border-radius:50%;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
}

/* 球门区（左侧） */
.goal-box{
  position:absolute;
  width:80px;height:180px;
  border:3px solid rgba(255,255,255,0.85);
  left:20px;top:50%;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.04);
}

/* 球门（左侧） */
#goal{
  position:absolute;
  width:14px;height:100px;
  left:17px;top:50%;
  transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:2;
}
.goal-post{
  position:absolute;
  background:#e8e8e8;
  box-shadow:2px 0 6px rgba(0,0,0,0.5);
}
.goal-left-post{ width:8px;height:100px;left:0;top:0;border-radius:2px; }
.goal-crossbar{ width:90px;height:8px;top:0;left:0;border-radius:2px; }
.goal-right-post{ width:8px;height:100px;right:0;top:0;border-radius:2px;display:none; }
/* 球门网 */
.goal-net{
  position:absolute;
  left:8px;top:8px;
  width:82px;height:92px;
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,0.15) 0,rgba(255,255,255,0.15) 1px, transparent 1px, transparent 12px),
    repeating-linear-gradient(90deg,rgba(255,255,255,0.15) 0,rgba(255,255,255,0.15) 1px, transparent 1px, transparent 12px);
}

/* 重新绘制球门 — 等腰梯形俯视效果 */
#goalSvg{
  position:absolute;
  left:17px;top:50%;transform:translateY(-50%);
  z-index:2;pointer-events:none;
}

/* 角球弧 */
.corner{
  position:absolute;
  width:24px;height:24px;
  border:3px solid rgba(255,255,255,0.6);
  border-radius:50%;
}
.corner.tl{top:12px;left:12px;clip-path:polygon(0 100%,100% 100%,100% 0);}
.corner.bl{bottom:12px;left:12px;clip-path:polygon(0 0,100% 0,100% 100%);}
.corner.tr{top:12px;right:12px;clip-path:polygon(0 0,0 100%,100% 100%);}
.corner.br{bottom:12px;right:12px;clip-path:polygon(0 0,0 100%,100% 0);}

/* ===== 玩家角色（俯视角4方向SVG）===== */
#player{
  position:absolute;
  width:56px;height:56px;
  z-index:10;
  pointer-events:none;
  transform:translate(-50%,-50%);
}

/* 4个方向SVG，默认隐藏，JS控制显示 */
.dir-svg{ display:none; position:absolute; top:0; left:0; }
.dir-svg.active{ display:block; }

/* 跑步时整体轻微上下抖动 */
@keyframes run-bounce{
  0%,100%{ transform:translateY(0); }
  50%     { transform:translateY(-2px); }
}
#player.running{ animation:run-bounce .28s linear infinite; }

/* 射门踢球动画（朝左/右方向踢腿）*/
@keyframes kick-anim{
  0%  { transform:translateY(0); }
  30% { transform:translateY(-4px) rotate(-4deg); }
  60% { transform:translateY(2px)  rotate(3deg); }
  100%{ transform:translateY(0); }
}
#player.kicking{ animation:kick-anim .35s ease-out; }

/* 点击目标光标 */
.click-marker{
  position:absolute;
  width:28px;height:28px;
  border:3px solid #ffd700;
  border-radius:50%;
  pointer-events:none;
  z-index:15;
  transform:translate(-50%,-50%);
  animation:markerFade .6s ease-out forwards;
}
@keyframes markerFade{
  0%  {opacity:1;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(2);}
}

/* ===== 足球 ===== */
#ball{
  position:absolute;
  width:22px;height:22px;
  z-index:9;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:none;
}
#ball svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));}

/* ===== 射门按钮 ===== */
#shootBtn{
  position:absolute;
  left:50%;bottom:22px;
  transform:translateX(-50%);
  width:120px;height:42px;
  background:linear-gradient(135deg,#00b4d8,#0077b6);
  border:2px solid #48cae4;
  border-radius:10px;
  color:#fff;
  font-size:18px;font-weight:bold;
  letter-spacing:3px;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(0,180,216,.5);
  z-index:20;
  transition:all .15s;
  font-family:inherit;
  display:flex;align-items:center;justify-content:center;
}
#shootBtn:hover{
  background:linear-gradient(135deg,#48cae4,#00b4d8);
  box-shadow:0 6px 24px rgba(0,180,216,.7);
  transform:translateX(-50%) translateY(-2px);
}
#shootBtn:active{transform:translateX(-50%) translateY(0);}
#shootBtn.hidden{display:none;}

/* ===== 倒计时 / 状态提示 ===== */
#statusTip{
  position:absolute;
  left:50%;top:14px;
  transform:translateX(-50%);
  padding:6px 20px;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.2);
  border-radius:20px;
  color:#ffe066;
  font-size:14px;font-weight:bold;
  letter-spacing:1px;
  z-index:20;
  white-space:nowrap;
  transition:opacity .3s;
}
#statusTip.hide{opacity:0;pointer-events:none;}

/* ===== 球飞行轨迹粒子 ===== */
.trail{
  position:absolute;
  width:8px;height:8px;
  background:rgba(255,220,50,.7);
  border-radius:50%;
  z-index:8;
  pointer-events:none;
  animation:fadeTrail .4s ease-out forwards;
}
@keyframes fadeTrail{to{opacity:0;transform:scale(0);}}

/* ===== 进球特效 ===== */
#goalFx{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:50;pointer-events:none;
  opacity:0;transition:opacity .3s;
}
#goalFx.show{opacity:1;}
.goal-text{
  font-size:72px;font-weight:900;
  color:#ffd700;
  text-shadow:0 0 30px #ff9900, 0 0 60px #ff6600, 4px 4px 0 #8a5a00;
  animation:goalPop .5s cubic-bezier(.36,.07,.19,.97);
  letter-spacing:4px;
}
@keyframes goalPop{
  0%{transform:scale(0) rotate(-15deg);}
  60%{transform:scale(1.2) rotate(5deg);}
  100%{transform:scale(1) rotate(0);}
}

/* ===== 顶部信息栏 ===== */
#topBar{
  width:700px;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;
  background:linear-gradient(90deg,#1a0a00,#2a1500,#1a0a00);
  border-bottom:2px solid #8a5a00;
  border-radius:8px 8px 0 0;
  margin-bottom:0;
}
.score-info{color:#ffd700;font-size:14px;font-weight:bold;letter-spacing:1px;}
.score-info span{color:#fff;font-size:18px;}
.hint-info{color:#c8a060;font-size:12px;}

/* ===== 底部信息 ===== */
#bottomBar{
  width:700px;
  padding:8px 16px 10px;
  background:linear-gradient(90deg,#1a0a00,#2a1500,#1a0a00);
  border-top:2px solid #8a5a00;
  border-radius:0 0 8px 8px;
  display:flex;align-items:center;justify-content:center;gap:20px;
}
.rule-tip{color:#a08050;font-size:12px;text-align:center;}
.rule-tip b{color:#ffd700;}

/* 遮罩提示 */
#startMask{
  position:absolute;inset:0;
  background:rgba(0,0,0,.7);
  z-index:80;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
}
.mask-title{color:#ffd700;font-size:28px;font-weight:900;letter-spacing:4px;
  text-shadow:0 0 20px rgba(255,215,0,.6);}
.mask-sub{color:#c8a060;font-size:14px;letter-spacing:1px;}
.start-btn{
  margin-top:8px;
  padding:12px 48px;
  background:linear-gradient(135deg,#f0a020,#c06000);
  border:2px solid #ffd700;border-radius:12px;
  color:#fff;font-size:18px;font-weight:bold;cursor:pointer;
  font-family:inherit;letter-spacing:2px;
  box-shadow:0 4px 20px rgba(255,160,0,.5);
  transition:all .15s;
}
.start-btn:hover{transform:scale(1.05);box-shadow:0 6px 28px rgba(255,160,0,.8);}
</style>
</head>
<body>

<!-- 顶部信息 -->
<div id="topBar">
  <div class="score-info">⚽ 进球数：<span id="goalCount">0</span></div>
  <div class="score-info" style="font-size:13px;color:#c8a060">蹴鞠射门小游戏</div>
  <div class="score-info">总射门：<span id="shotCount">0</span></div>
</div>

<!-- 游戏主容器 -->
<div id="gameWrap">

  <!-- 球场 -->
  <div id="field">
    <div class="field-lines"></div>
    <div class="center-line"></div>
    <div class="center-circle"></div>
    <div class="goal-box"></div>
    <div class="corner tl"></div>
    <div class="corner bl"></div>
    <div class="corner tr"></div>
    <div class="corner br"></div>

    <!-- 球门 SVG -->
    <svg id="goalSvg" width="100" height="110" viewBox="0 0 100 110">
      <!-- 横梁 -->
      <rect x="0" y="0" width="100" height="9" rx="3" fill="#e0e0e0" filter="url(#shadow)"/>
      <!-- 左门柱 -->
      <rect x="0" y="0" width="9" height="100" rx="3" fill="#e0e0e0"/>
      <!-- 右门柱 -->
      <rect x="91" y="0" width="9" height="100" rx="3" fill="#e0e0e0"/>
      <!-- 球网 横线 -->
      <line x1="9" y1="22" x2="91" y2="22" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line x1="9" y1="38" x2="91" y2="38" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line x1="9" y1="54" x2="91" y2="54" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line x1="9" y1="70" x2="91" y2="70" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line x1="9" y1="86" x2="91" y2="86" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <!-- 球网 竖线 -->
      <line x1="25" y1="9" x2="25" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line x1="41" y1="9" x2="41" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line x1="57" y1="9" x2="57" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line x1="73" y1="9" x2="73" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <!-- 底线 -->
      <rect x="0" y="100" width="100" height="9" rx="3" fill="#e0e0e0" opacity="0.5"/>
      <defs>
        <filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.4)"/></filter>
      </defs>
    </svg>
  </div>

  <!-- 玩家（俯视角4方向SVG）-->
  <div id="player">
    <!-- 朝左 -->
    <svg class="dir-svg active" id="dir-left" width="56" height="56" viewBox="0 0 56 56">
      <!-- 阴影 -->
      <ellipse cx="28" cy="50" rx="14" ry="4" fill="rgba(0,0,0,0.18)"/>

      <!-- 号码7 -->
      <text x="25" y="33" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial">7</text>
      <!-- 短裤 -->
      <rect x="19" y="34" width="18" height="9" rx="3" fill="#1a3a8a"/>
      <!-- 前臂（朝前伸） -->
      <rect x="10" y="24" width="10" height="7" rx="3" fill="#f0a020" stroke="#c06000" stroke-width="1"/>
      <!-- 后臂 -->
      <rect x="36" y="24" width="8" height="6" rx="3" fill="#e08010" stroke="#c06000" stroke-width="1"/>
      <!-- 前腿 -->
      <rect class="leg-front" x="26" y="34" width="7" height="14" rx="3" fill="#f5d5a0"/>
      <rect x="24" y="46" width="10" height="5" rx="2" fill="#222"/>
      <!-- 头 -->
      <circle cx="18" cy="16" r="11" fill="#fde8c8" stroke="#c0905a" stroke-width="1.5"/>
      <!-- 头发 -->
      <ellipse cx="18" cy="8" rx="9" ry="6" fill="#3a2000"/>
      <!-- 眼睛 -->
      <circle cx="13" cy="15" r="2" fill="#222"/>
      <!-- 耳朵 -->
      <ellipse cx="26" cy="17" rx="3" ry="4" fill="#e8c090" stroke="#c0905a" stroke-width="1"/>
    </svg>

    <!-- 朝右（朝左镜像）-->
    <svg class="dir-svg" id="dir-right" width="56" height="56" viewBox="0 0 56 56" style="transform:scaleX(-1);transform-origin:28px 28px">
      <ellipse cx="28" cy="50" rx="14" ry="4" fill="rgba(0,0,0,0.18)"/>
      <rect class="leg-back" x="22" y="34" width="7" height="13" rx="3" fill="#e0b870"/>
      <rect x="18" y="45" width="9" height="5" rx="2" fill="#222"/>
      <rect x="18" y="22" width="20" height="14" rx="4" fill="#f0a020" stroke="#c06000" stroke-width="1.2"/>
      <text x="25" y="33" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial">7</text>
      <rect x="19" y="34" width="18" height="9" rx="3" fill="#1a3a8a"/>
      <rect x="10" y="24" width="10" height="7" rx="3" fill="#f0a020" stroke="#c06000" stroke-width="1"/>
      <rect x="36" y="24" width="8" height="6" rx="3" fill="#e08010" stroke="#c06000" stroke-width="1"/>
      <rect class="leg-front" x="26" y="34" width="7" height="14" rx="3" fill="#f5d5a0"/>
      <rect x="24" y="46" width="10" height="5" rx="2" fill="#222"/>
      <circle cx="18" cy="16" r="11" fill="#fde8c8" stroke="#c0905a" stroke-width="1.5"/>
      <ellipse cx="18" cy="8" rx="9" ry="6" fill="#3a2000"/>
      <circle cx="13" cy="15" r="2" fill="#222"/>
      <ellipse cx="26" cy="17" rx="3" ry="4" fill="#e8c090" stroke="#c0905a" stroke-width="1"/>
    </svg>

    <!-- 朝下（正面）-->
    <svg class="dir-svg" id="dir-down" width="56" height="56" viewBox="0 0 56 56">
      <ellipse cx="28" cy="52" rx="14" ry="4" fill="rgba(0,0,0,0.18)"/>
      <!-- 腿左 -->
      <rect class="leg-back" x="20" y="36" width="7" height="14" rx="3" fill="#f5d5a0"/>
      <rect x="18" y="47" width="10" height="5" rx="2" fill="#222"/>
      <!-- 腿右 -->
      <rect class="leg-front" x="29" y="36" width="7" height="14" rx="3" fill="#e0b870"/>
      <rect x="28" y="47" width="10" height="5" rx="2" fill="#222"/>
      <!-- 短裤 -->
      <rect x="18" y="33" width="20" height="9" rx="3" fill="#1a3a8a"/>
      <!-- 身体 -->
      <rect x="17" y="20" width="22" height="15" rx="4" fill="#f0a020" stroke="#c06000" stroke-width="1.2"/>
      <text x="28" y="32" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial">7</text>
      <!-- 左臂 -->
      <rect x="8" y="22" width="10" height="7" rx="3" fill="#f0a020" stroke="#c06000" stroke-width="1" transform="rotate(-20,13,25)"/>

      <rect x="38" y="22" width="10" height="7" rx="3" fill="#f0a020" stroke="#c06000" stroke-width="1" transform="rotate(20,43,25)"/>
      <!-- 头 -->
      <circle cx="28" cy="13" r="11" fill="#fde8c8" stroke="#c0905a" stroke-width="1.5"/>
      <ellipse cx="28" cy="5" rx="9" ry="6" fill="#3a2000"/>
      <!-- 眼睛 -->
      <circle cx="23" cy="13" r="2" fill="#222"/>
      <circle cx="33" cy="13" r="2" fill="#222"/>
    </svg>

    <!-- 朝上（背面）-->
    <svg class="dir-svg" id="dir-up" width="56" height="56" viewBox="0 0 56 56">
      <ellipse cx="28" cy="52" rx="14" ry="4" fill="rgba(0,0,0,0.18)"/>
      <!-- 腿左 -->
      <rect class="leg-back" x="20" y="36" width="7" height="14" rx="3" fill="#f5d5a0"/>
      <rect x="18" y="47" width="10" height="5" rx="2" fill="#222"/>
      <!-- 腿右 -->
      <rect class="leg-front" x="29" y="36" width="7" height="14" rx="3" fill="#e0b870"/>
      <rect x="28" y="47" width="10" height="5" rx="2" fill="#222"/>

      <rect x="18" y="33" width="20" height="9" rx="3" fill="#1a3a8a"/>

  <!-- 足球 -->
  <div id="ball">
    <svg width="22" height="22" viewBox="0 0 22 22">
      <circle cx="11" cy="11" r="10" fill="#fff" stroke="#222" stroke-width="1"/>
      <path d="M11 1 L14 7 L11 8 L8 7 Z" fill="#222"/>
      <path d="M20 7 L15 9 L14 7 L17 3 Z" fill="#222"/>
      <path d="M20 15 L15 13 L15 9 L20 7 Z" fill="#222"/>
      <path d="M14 21 L11 16 L15 13 L20 15 Z" fill="#222"/>
      <path d="M8 21 L11 16 L11 8 L8 7 Z" fill="#222" opacity="0.8"/>
      <path d="M2 15 L7 13 L11 16 L8 21 Z" fill="#222"/>
      <path d="M2 7 L7 9 L7 13 L2 15 Z" fill="#222" opacity="0.8"/>
      <path d="M5 3 L8 7 L7 9 L2 7 Z" fill="#222"/>
    </svg>
  </div>

  <!-- 状态提示 -->
  <div id="statusTip" class="hide"></div>

  <!-- 射门按钮 -->
  <button id="shootBtn" class="hidden" onclick="shoot()">射门键</button>

  <!-- 进球特效 -->
  <div id="goalFx"><div class="goal-text">GOAL!</div></div>

  <!-- 开始遮罩 -->
  <div id="startMask">
    <div class="mask-title">⚽ 蹴鞠射门</div>
    <div class="mask-sub">移动鼠标控制球员 · 点击射门键射球</div>
    <button class="start-btn" onclick="startGame()">开始游戏</button>
  </div>

</div>

<!-- 底部提示 -->
<div id="bottomBar">
  <div class="rule-tip">🖱️ <b>移动鼠标</b> 控制球员 &nbsp;|&nbsp; 🎯 <b>点击射门键</b> 将球射向球门方向 &nbsp;|&nbsp; ⏱️ 射门后 <b>5秒</b> 自动重置</div>
</div>

<script>
/* =====================================================
   游戏状态
===================================================== */
const FIELD_W = 700, FIELD_H = 520;
const BALL_TRAVEL = FIELD_W * 0.75;   // 规则5：3/4 场长
const WALK_SPEED  = 280;              // 像素/秒

const player   = document.getElementById('player');
const ball     = document.getElementById('ball');
const shootBtn = document.getElementById('shootBtn');
const statusTip= document.getElementById('statusTip');
const goalFx   = document.getElementById('goalFx');
const goalCount= document.getElementById('goalCount');
const shotCount= document.getElementById('shotCount');
const fieldEl  = document.getElementById('field');
// playerBody已废弃，改为直接操作 #player

// 球员当前位置
let px = FIELD_W * 0.65, py = FIELD_H * 0.55;

// 朝向：'left'|'right'|'up'|'down'，初始朝向球门（朝左）
let facing = 'left';
// 跑步腿部帧切换计时器
let legFrame = 0;
let legTimer = null;

// 移动目标
let targetX = px, targetY = py;
let isWalking = false;
let walkAnim  = null;
let lastTime  = null;

// 状态机
const STATE = {READY:'ready', FLYING:'flying', RESET:'reset'};
let state = STATE.READY;
let goalCnt = 0, shotCnt = 0;
let resetTimer = null;
let ballAnim = null;

// 球门区域（SVG：left:17, top:50%-55px, 100×100门框）
const GOAL_LEFT   = 17;
const GOAL_TOP    = (FIELD_H - 110) / 2;
const GOAL_RIGHT  = GOAL_LEFT + 100;
const GOAL_BOTTOM = GOAL_TOP  + 100;

/* =====================================================
   初始化
===================================================== */
function startGame(){
  document.getElementById('startMask').style.display = 'none';
  syncBallToFeet();
  renderPlayer();
  shootBtn.classList.remove('hidden');
  showTip('点击球场地板移动角色，到达后点击 射门键 射门！');
}

/* =====================================================
   同步球到脚下（始终贴脚）
===================================================== */
function syncBallToFeet(){
  ball.style.left = px + 'px';
  ball.style.top  = (py + 14) + 'px'; // 球在脚底稍下
}

function renderPlayer(){
  player.style.left = px + 'px';
  player.style.top  = py + 'px';
  player.style.transform = 'translate(-50%,-50%)';
  // 切换方向SVG
  ['left','right','up','down'].forEach(d => {
    document.getElementById('dir-'+d).classList.toggle('active', d === facing);
  });
}

/* =====================================================
   点击地板 → 设置行走目标（f1）
===================================================== */
fieldEl.addEventListener('click', e => {
  // 如果点击的是射门按钮，不处理移动
  if(e.target === shootBtn || shootBtn.contains(e.target)) return;
  if(state !== STATE.READY) return;

  const rect = fieldEl.getBoundingClientRect();
  let mx = e.clientX - rect.left;
  let my = e.clientY - rect.top;

  // 限制在场地内（留边距）
  mx = Math.max(30, Math.min(FIELD_W - 30, mx));
  my = Math.max(30, Math.min(FIELD_H - 60, my));

  targetX = mx; targetY = my;

  // 生成目标点光标
  spawnClickMarker(mx, my);

  // 开始行走
  startWalking();
});

/* =====================================================
   行走动画循环（f2 球始终跟脚，f3 跑步动画）
===================================================== */
function startWalking(){
  if(isWalking) return;
  isWalking = true;
  lastTime = null;
  player.classList.add('running');
  // 腿部帧动画：每180ms切换一次腿部高低
  legFrame = 0;
  if(legTimer) clearInterval(legTimer);
  legTimer = setInterval(toggleLegFrame, 180);
  walkAnim = requestAnimationFrame(walkStep);
}

function stopWalking(){
  isWalking = false;
  player.classList.remove('running');
  if(walkAnim){ cancelAnimationFrame(walkAnim); walkAnim = null; }
  if(legTimer){ clearInterval(legTimer); legTimer = null; }
  // 重置腿部到静止帧
  resetLegFrames();
}

function walkStep(now){
  if(!lastTime){ lastTime = now; }
  const dt = Math.min((now - lastTime) / 1000, 0.1); // 秒，最大0.1防跳帧
  lastTime = now;

  const dx = targetX - px;
  const dy = targetY - py;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if(dist < 3){
    // 到达目标
    px = targetX; py = targetY;
    stopWalking();
    syncBallToFeet();
    renderPlayer();
    return;
  }

  // 更新朝向：根据主导移动方向决定4方向
  const newFacing = calcFacing(dx, dy);
  if(newFacing !== facing){
    facing = newFacing;
    renderPlayer();
  }

  // 按速度推进
  const step = Math.min(WALK_SPEED * dt, dist);
  px += (dx / dist) * step;
  py += (dy / dist) * step;

  // f2：球始终紧跟脚下
  syncBallToFeet();
  renderPlayer();

  walkAnim = requestAnimationFrame(walkStep);
}

/* =====================================================
   朝向辅助函数
===================================================== */
// dx,dy → 'left'|'right'|'up'|'down'（取绝对值大的轴决定主方向）
function calcFacing(dx, dy){
  if(Math.abs(dx) >= Math.abs(dy)){
    return dx < 0 ? 'left' : 'right';
  } else {
    return dy < 0 ? 'up' : 'down';
  }
}

// facing字符串 → 单位向量
function facingToVector(f){
  return { left:{x:-1,y:0}, right:{x:1,y:0}, up:{x:0,y:-1}, down:{x:0,y:1} }[f];
}

// 腿部帧交替（跑步动画：前后腿互换位置）
function toggleLegFrame(){
  legFrame = 1 - legFrame;
  // 在当前active的SVG里切换腿部长短
  const svg = document.querySelector('.dir-svg.active');
  if(!svg) return;
  const legB = svg.querySelector('.leg-back');
  const legF = svg.querySelector('.leg-front');
  if(!legB || !legF) return;
  if(legFrame === 0){
    // 帧A：后腿缩短，前腿伸长
    legB.setAttribute('height','10');
    legF.setAttribute('height','14');
  } else {
    // 帧B：后腿伸长，前腿缩短（交叉步）
    legB.setAttribute('height','14');
    legF.setAttribute('height','10');
  }
}

function resetLegFrames(){
  document.querySelectorAll('.dir-svg').forEach(svg => {
    const legB = svg.querySelector('.leg-back');
    const legF = svg.querySelector('.leg-front');
    if(legB) legB.setAttribute('height', svg.id==='dir-left'||svg.id==='dir-right' ? '13':'14');
    if(legF) legF.setAttribute('height', svg.id==='dir-left'||svg.id==='dir-right' ? '14':'14');
  });
}

/* =====================================================
   目标点光标特效
===================================================== */
function spawnClickMarker(x, y){
  const m = document.createElement('div');
  m.className = 'click-marker';
  m.style.left = x + 'px';
  m.style.top  = y + 'px';
  fieldEl.appendChild(m);
  setTimeout(()=> m.remove(), 650);
}

/* =====================================================
   规则5：点击射门键 → 球沿当前方向射出 3/4 场长
===================================================== */
function shoot(){
  if(state !== STATE.READY) return;
  // 射门时停止行走
  stopWalking();

  state = STATE.FLYING;
  shootBtn.classList.add('hidden');
  shotCnt++;
  shotCount.textContent = shotCnt;

  // 射门踢腿动画
  player.classList.remove('running');
  player.classList.add('kicking');
  setTimeout(()=> player.classList.remove('kicking'), 380);

  // 方向：按人物当前朝向射出（4方向转单位向量）
  const bx = px, by = py + 14;
  const fvec = facingToVector(facing);
  const ux = fvec.x, uy = fvec.y;

  const endX = bx + ux * BALL_TRAVEL;
  const endY = by + uy * BALL_TRAVEL;

  animateBall(bx, by, endX, endY, 800, () => {
    checkGoal(endX, endY);
  });
}

/* =====================================================
   球飞行动画（含旋转 + 轨迹粒子）
===================================================== */
let rotation = 0;
function animateBall(x0, y0, x1, y1, duration, onDone){
  const startTime = performance.now();
  const ballEl = document.getElementById('ball');

  function step(now){
    const t = Math.min((now - startTime) / duration, 1);
    // easeOut
    const ease = 1 - Math.pow(1 - t, 3);
    const cx = x0 + (x1 - x0) * ease;
    const cy = y0 + (y1 - y0) * ease;

    ballEl.style.left = cx + 'px';
    ballEl.style.top  = cy + 'px';

    // 旋转
    rotation += 8;
    ballEl.querySelector('svg').style.transform = `rotate(${rotation}deg)`;

    // 轨迹粒子（每隔一帧）
    if(Math.round(t * 100) % 5 === 0) spawnTrail(cx, cy);

    if(t < 1){ ballAnim = requestAnimationFrame(step); }
    else{ onDone && onDone(); }
  }
  ballAnim = requestAnimationFrame(step);
}

function spawnTrail(x, y){
  const tr = document.createElement('div');
  tr.className = 'trail';
  tr.style.left = (x - 4) + 'px';
  tr.style.top  = (y - 4) + 'px';
  fieldEl.appendChild(tr);
  setTimeout(()=> tr.remove(), 400);
}

/* =====================================================
   判断进球
===================================================== */
function checkGoal(tx, ty){
  const inGoalX = tx <= GOAL_RIGHT + 20;
  const inGoalY = ty >= GOAL_TOP && ty <= GOAL_BOTTOM;

  if(inGoalX && inGoalY){
    // 进球！
    goalCnt++;
    goalCount.textContent = goalCnt;
    showGoalFx();
    showTip('⚽ GOAL！精彩射门！5秒后重置');
  } else {
    showTip('😮 射偏了！5秒后重置...');
  }

  // 规则6：5秒后重置
  state = STATE.RESET;
  resetTimer = setTimeout(resetBall, 5000);
}

/* =====================================================
   进球特效
===================================================== */
function showGoalFx(){
  goalFx.classList.add('show');
  setTimeout(()=> goalFx.classList.remove('show'), 1800);
}

/* =====================================================
   规则6：5秒后球重置，射门键重现
===================================================== */
function resetBall(){
  if(ballAnim) cancelAnimationFrame(ballAnim);

  // 球重新贴回脚下
  syncBallToFeet();
  ball.querySelector('svg').style.transform = '';
  rotation = 0;

  state = STATE.READY;
  shootBtn.classList.remove('hidden');
  showTip('点击地板移动角色，靠近球门后点击 射门键！', 2800);
}

/* =====================================================
   状态提示
===================================================== */
let tipTimer = null;
function showTip(msg, duration = 0){
  statusTip.textContent = msg;
  statusTip.classList.remove('hide');
  if(tipTimer) clearTimeout(tipTimer);
  if(duration > 0){
    tipTimer = setTimeout(()=> statusTip.classList.add('hide'), duration);
  }
}

/* =====================================================
   键盘快捷键：空格键 / F 键也可以射门
===================================================== */
document.addEventListener('keydown', e=>{
  if(e.code === 'Space' || e.code === 'KeyF'){
    e.preventDefault();
    shoot();
  }
});
</script>
</body>
</html>
